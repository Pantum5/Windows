<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mini Games</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 50%, #1e1b2e 100%);
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.08) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 0.8; }
            100% { transform: translateY(0px) rotate(360deg); opacity: 0.3; }
        }
        
        .particle {
            position: fixed;
            bottom: -50px;
            width: 8px;
            height: 8px;
            background: rgba(0, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 6s infinite ease-in-out;
            pointer-events: none;
            z-index: 0;
        }
        
        #app {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .game-selector {
            text-align: center;
            width: 100%;
            max-width: 500px;
            animation: fadeInUp 0.6s ease;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .game-selector h1 {
            font-size: 42px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        
        .game-selector p.subtitle {
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
        }
        
        .game-buttons {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .game-btn {
            background: linear-gradient(135deg, rgba(30, 40, 60, 0.9), rgba(20, 25, 45, 0.9));
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 30px;
            padding: 30px 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .game-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .game-btn:hover::before { left: 100%; }
        .game-btn:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #0ff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
        }
        
        .game-btn h2 { color: white; font-size: 36px; margin: 0 0 10px 0; }
        .game-btn p { color: #88aacc; font-size: 14px; margin: 0; }
        
        .game-container {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            animation: fadeInUp 0.4s ease;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 10px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 60px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            flex-wrap: wrap;
        }
        
        .game-header button {
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 40px;
            padding: 8px 18px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .game-header button:hover {
            background: rgba(0, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        .score {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(0, 255, 255, 0.05));
            border-radius: 40px;
            padding: 8px 18px;
            color: #0ff;
            font-weight: bold;
            font-size: 18px;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            aspect-ratio: 1 / 1;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 255, 0.1);
        }
        
        .memory-card {
            background: linear-gradient(145deg, #1e2a3a, #0f1a24);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid rgba(0, 255, 255, 0.2);
            transform: scale(1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .memory-card.flipped {
            background: linear-gradient(145deg, #2a3a5a, #1a2a4a);
            border-color: #0ff;
            transform: scale(0.98);
        }
        
        .memory-card.matched {
            opacity: 0.5;
            cursor: default;
            filter: grayscale(0.5);
            transform: scale(0.95);
        }
        
        .grid-2048 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 20px;
            aspect-ratio: 1 / 1;
            border: 1px solid rgba(0, 255, 255, 0.1);
        }
        
        .tile {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 32px;
            color: white;
            transition: all 0.1s ease;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: tileAppear 0.15s ease;
        }
        
        @keyframes tileAppear {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .win-toast {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #0ff, #0a0);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            z-index: 100;
            animation: fadeInUp 0.3s ease;
            box-shadow: 0 0 30px rgba(0,255,0,0.5);
        }
        
        video { display: none; }
        .loader { display: none; }
    </style>
</head>
<body>
    <div id="app"></div>
    <video id="video" autoplay playsinline muted></video>
    <script src="script.js"></script>
    <script>
        // Плавающие частицы
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.animationDuration = 4 + Math.random() * 4 + 's';
            particle.style.width = 4 + Math.random() * 8 + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = `rgba(${Math.random() * 100 + 155}, ${Math.random() * 100 + 155}, 255, 0.5)`;
            document.body.appendChild(particle);
        }
    </script>
</body>
</html>
