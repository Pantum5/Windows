<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mini Games</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0f1e;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }
        
        /* Стили для выбора игры */
        .game-selector {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        
        .game-selector h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0,255,255,0.3);
        }
        
        .game-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .game-btn {
            background: linear-gradient(135deg, #1a2a3a, #0f1a24);
            border: 2px solid rgba(0,255,255,0.3);
            border-radius: 24px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .game-btn:hover {
            transform: scale(1.02);
            border-color: #0ff;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }
        
        .game-btn h2 {
            color: white;
            font-size: 32px;
            margin: 0 0 8px 0;
        }
        
        .game-btn p {
            color: #88aacc;
            font-size: 14px;
            margin: 0;
        }
        
        /* Стили для игр */
        .game-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        
        .back-btn:hover {
            background: rgba(0,255,255,0.2);
        }
        
        .score {
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 8px 20px;
            color: #0ff;
            font-weight: bold;
            font-size: 20px;
        }
        
        /* Мемори сетка */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            aspect-ratio: 1 / 1;
        }
        
        .memory-card {
            background: linear-gradient(145deg, #1e2a3a, #0f1a24);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid rgba(0,255,255,0.2);
            transform-style: preserve-3d;
        }
        
        .memory-card.flipped, .memory-card.matched {
            background: linear-gradient(145deg, #2a3a4a, #1a2a3a);
            border-color: #0ff;
            transform: scale(0.98);
        }
        
        .memory-card.matched {
            opacity: 0.6;
            cursor: default;
            filter: grayscale(0.3);
        }
        
        /* 2048 сетка */
        .grid-2048 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 12px;
            aspect-ratio: 1 / 1;
        }
        
        .tile {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 28px;
            color: white;
            transition: all 0.1s ease;
        }
        
        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .game-container, .game-selector {
            animation: fadeIn 0.3s ease;
        }
        
        video {
            display: none;
        }
        
        .loader {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <video id="video" autoplay playsinline muted></video>
    <script src="script.js"></script>
</body>
</html>
